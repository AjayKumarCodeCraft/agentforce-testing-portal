<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Surescripts Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card">
            <h2>Partner Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="password" id="password" placeholder="Password" required style="width:100%; margin-bottom:10px; padding:10px;">
                <button type="submit" class="stat" style="background:#007cba; color:white; border:none; width:100%; cursor:pointer;">Login</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            login(document.getElementById('email').value, document.getElementById('password').value);
        });
    </script>
</body>
</html>
